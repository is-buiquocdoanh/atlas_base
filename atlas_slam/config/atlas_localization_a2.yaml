map_server:
  ros__parameters:
    yaml_filename: ""

map_saver:
  ros__parameters:
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

amcl:
  ros__parameters:
    # === Motion model: Differential cho robot 2 bánh ===
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.05   # noise quay-do-quay (tin odom hơn)
    alpha2: 0.05   # noise quay-do-tiến
    alpha3: 0.05   # noise tiến-do-tiến
    alpha4: 0.05   # noise tiến-do-quay
    alpha5: 0.05   # không dùng cho differential, giữ mặc định

    # === Frame config ===
    base_frame_id: "base_link"
    global_frame_id: "map"
    odom_frame_id: "odom"
    tf_broadcast: true
    transform_tolerance: 0.5

    # === Laser config — RPLidar A2M12 ===
    scan_topic: /atlas/scan_filtered
    laser_model_type: "likelihood_field"
    laser_min_range: 0.15      # A2M12 min range
    laser_max_range: 12.0      # A2M12 max range ~12m
    laser_likelihood_max_dist: 2.0
    max_beams: 200             # tăng: dùng nhiều tia → hội tụ nhanh hơn
    sigma_hit: 0.1             # siết chặt: A2M12 chính xác, yêu cầu match sát

    # === Beam skip ===
    do_beamskip: true
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3

    # === Particle filter ===
    min_particles: 1500        # tăng: luôn đủ hạt để hội tụ chính xác
    max_particles: 5000        # tăng: phủ rộng, PC không lo CPU
    pf_err: 0.02               # siết: yêu cầu chính xác hơn
    pf_z: 0.99
    resample_interval: 2       # giữ đa dạng hạt, tránh depletion khi lắc
    recovery_alpha_fast: 0.05  # giảm: ít inject hạt random khi lắc
    recovery_alpha_slow: 0.001

    # === Update triggers ===
    update_min_a: 0.03         # update khi quay ~1.7° → phản ứng nhanh
    update_min_d: 0.05         # update khi đi 5cm → bám sát chuyển động

    # === Sensor weights ===
    z_hit: 0.7
    z_max: 0.05
    z_rand: 0.2
    z_short: 0.05
    lambda_short: 0.1

    save_pose_rate: 0.5
