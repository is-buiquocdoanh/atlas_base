map_server:
  ros__parameters:
    # Overridden in launch by the "map" launch configuration or provided default value.
    # To use in yaml, remove the default "map" value in the tb3_simulation_launch.py file & provide full path to map below.
    yaml_filename: ""

map_saver:
  ros__parameters:
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

amcl:
  ros__parameters:
    # === Motion model: OmniMotionModel cho mecanum ===
    robot_model_type: "nav2_amcl::OmniMotionModel"
    alpha1: 0.05   # noise quay-do-quay (giảm → tin odom hơn, particles ít spread)
    alpha2: 0.05   # noise quay-do-tiến
    alpha3: 0.05   # noise tiến-do-tiến
    alpha4: 0.05   # noise tiến-do-quay
    alpha5: 0.05   # noise tiến-do-đi-ngang (omni strafe)

    # === Frame config ===
    base_frame_id: "base_link"
    global_frame_id: "map"
    odom_frame_id: "odom"
    tf_broadcast: true
    transform_tolerance: 0.5

    # === Laser config — YDLidar TG30 ===
    scan_topic: /atlas/scan_filtered
    laser_model_type: "likelihood_field"
    laser_min_range: 0.1       # TG30 min range
    laser_max_range: 25.0      # TG30 max ~30m, giữ margin
    laser_likelihood_max_dist: 2.0
    max_beams: 240             # nhiều tia hơn → measurement update mạnh hơn → hội tụ nhanh
    sigma_hit: 0.15            # siết lại → particles hội tụ chặt hơn về vị trí đúng

    # === Beam skip — lọc tia bị chặn bởi vật động ===
    do_beamskip: true
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3

    # === Particle filter ===
    min_particles: 1500        # tăng: luôn đủ hạt để không bị hội tụ sai khi lắc
    max_particles: 5000        # tăng: phủ rộng hơn khi robot di chuyển nhanh
    pf_err: 0.02               # giảm: yêu cầu particle filter chính xác hơn
    pf_z: 0.99
    resample_interval: 2       # resample mỗi 2 update thay vì 1 → tránh mất đa dạng hạt khi lắc
    recovery_alpha_fast: 0.05  # giảm: ít inject hạt ngẫu nhiên → tránh nhiễu khi lắc nhanh
    recovery_alpha_slow: 0.001

    # === Update triggers ===
    update_min_a: 0.01         # update khi quay ~3° (mecanum quay nhiều)
    update_min_d: 0.03         # update khi đi 8cm (mecanum di chuyển tinh chỉnh)

    # === Sensor weights ===
    z_hit: 0.7
    z_max: 0.05
    z_rand: 0.2
    z_short: 0.05
    lambda_short: 0.1

    save_pose_rate: 0.5

slam_toolbox:
  ros__parameters:

    # Plugin params
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ROS Parameters
    odom: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /atlas/scan_filtered
    use_map_saver: true
    mode: localization

    # if you'd like to immediately start continuing a map at a given pose
    # or at the dock, but they are mutually exclusive, if pose is given
    # will use pose
    # map_file_name: src/k1_nav/maps/map_v1
    map_file_name: ""
    map_start_pose: [0.0, 0.0, 0.0]
    # map_start_at_dock: true

    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02 #if 0 never publishes odometry
    map_update_interval: 99999999.0
    resolution: 0.05
    restamp_tf: false
    min_laser_range: 0.1 #for rastering images — TG30 min
    max_laser_range: 25.0 #for rastering images — TG30 practical max
    minimum_time_interval: 0.1  # 0.5→0.1: xử lý scan 10x/s thay vì 2x/s
    transform_timeout: 0.3      # 0.2→0.3: tránh TF lookup failure
    tf_buffer_duration: 30.
    stack_size_to_use: 40000000 #// program needs a larger stack size to serialize large maps
    enable_interactive_mode: true

    # General Parameters
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.03  # 0.05→0.03: cập nhật scan match thường xuyên hơn
    minimum_travel_heading: 0.03   # 0.05→0.03: cập nhật khi quay ~1.7°
    check_min_dist_and_heading_precisely: true
    scan_buffer_size: 10            # 30→10: localization không cần buffer lớn, tiết kiệm RAM
    scan_buffer_maximum_scan_distance: 10.0  # 12→10: chỉ lấy scan gần hơn để match
    link_match_minimum_response_fine: 0.35   # 0.1→0.35: chỉ accept match chất lượng tốt
    link_scan_maximum_distance: 2.0          # 1.5→2.0: match qua khoảng cách lớn hơn
    loop_search_maximum_distance: 6.0 # 1/2 max khoang cach scan match de tim loop closure
    do_loop_closing: false
    loop_match_minimum_chain_size: 10           
    loop_match_maximum_variance_coarse: 3.0  
    loop_match_minimum_response_coarse: 0.35    
    loop_match_minimum_response_fine: 0.45

    # Correlation Parameters - Correlation Parameters
    correlation_search_space_dimension: 0.7  # 0.5→0.7: tìm match trong bán kính 35cm (thay vì 25cm)
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # Correlation Parameters - Loop Closure Parameters
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Scan Matcher Parameters
    distance_variance_penalty: 0.4   # 0.1→0.4: penalty cho sai lệch vị trí — cân bằng giữa odometry và scan
    angle_variance_penalty: 0.9      # 0.3→0.9: penalty cho sai lệch góc — tránh nhảy góc đột ngột
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.5  # 0.349→0.5: tìm góc trong phạm vi ±28.6° (thay vì ±20°)
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
    min_pass_through: 2
    occupancy_threshold: 0.5         # 0.1→0.5: chỉ match với ô có xác suất chiếm cao, giảm false match

