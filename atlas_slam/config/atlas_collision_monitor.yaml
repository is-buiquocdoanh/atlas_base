collision_monitor:
  ros__parameters:
    enabled: true
    base_frame_id: "base_link"
    odom_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.5
    source_timeout: 5.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    # Polygons represent zone around the robot for "stop", "slowdown" and "limit" action types,
    # and robot footprint for "approach" action type.
    # (1) Footprint could be "polygon" type with dynamically set footprint from footprint_topic
    # (2) "circle" type with static footprint set by radius. "footprint_topic" parameter
    # to be ignored in circular case.
    # (3) "velocity_polygon" type with dynamically set polygon from velocity_polygons
    polygons: ["PolygonStop", "PolygonSlow", "FootprintApproach"]
    PolygonStop:
      type: "polygon"
      points: [
        0.0,   0.27,   # Điểm 1: Bên trái robot (90 độ)
        0.135, 0.234,  # Điểm 2: Góc 60 độ  (0.27 * cos(60), 0.27 * sin(60))
        0.234, 0.135,  # Điểm 3: Góc 30 độ  (0.27 * cos(30), 0.27 * sin(30))
        0.27,  0.0,    # Điểm 4: Chính giữa phía trước (0 độ)
        0.234, -0.135, # Điểm 5: Góc -30 độ (0.27 * cos(-30), 0.27 * sin(-30))
        0.135, -0.234, # Điểm 6: Góc -60 độ (0.27 * cos(-60), 0.27 * sin(-60))
        0.0,   -0.27,  # Điểm 7: Bên phải robot (-90 độ)
        0.0,   0.0     # Điểm 8: Gốc tọa độ để đóng tâm hình tròn
      ]
      action_type: "stop"
      max_points: 3
      visualize: true
      polygon_pub_topic: "polygon_stop"
      enabled: true
    PolygonSlow:
      type: "polygon"
      points: [0.4, 0.4, 0.4, -0.4, -0.4, -0.4, -0.4, 0.4]
      action_type: "slowdown"
      max_points: 3
      slowdown_ratio: 0.5 
      visualize: true
      polygon_pub_topic: "polygon_slowdown"
      enabled: true
    PolygonLimit: # chưa hỗ trợ trên ros2 humble
      type: "polygon"
      points: [0.5, 0.5, 0.5, -0.5, -0.5, -0.5, -0.5, 0.5]
      action_type: "limit"
      max_points: 3
      linear_limit: 0.7 
      angular_limit: 0.5
      visualize: true
      polygon_pub_topic: "polygon_limit"
      enabled: false
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 2.0
      simulation_time_step: 0.1
      min_points: 6
      visualize: true
      enabled: true
    VelocityPolygonStop: # Chưa hỗ trợ trên ros2 humble
      type: "velocity_polygon"
      action_type: "stop"
      min_points: 6
      visualize: true
      enabled: true
      polygon_pub_topic: "velocity_polygon_stop"
      velocity_polygons: ["rotation", "translation_forward", "translation_backward", "stopped"]
      holonomic: false
      rotation:
        points: [0.3, 0.3, 0.3, -0.3, -0.3, -0.3, -0.3, 0.3]
        linear_min: 0.0
        linear_max: 0.05
        theta_min: -1.0
        theta_max: 1.0
      translation_forward:
        points: [0.35, 0.3, 0.35, -0.3, -0.2, -0.3, -0.2, 0.3]
        linear_min: 0.0
        linear_max: 1.0
        theta_min: -1.0
        theta_max: 1.0
      translation_backward:
        points: [0.2, 0.3, 0.2, -0.3, -0.35, -0.3, -0.35, 0.3]
        linear_min: -1.0
        linear_max: 0.0
        theta_min: -1.0
        theta_max: 1.0
      # This is the last polygon to be checked, it should cover the entire range of robot's velocities
      # It is used as the stopped polygon when the robot is not moving and as a fallback if the velocity
      # is not covered by any of the other sub-polygons
      stopped:
        points: [0.25, 0.25, 0.25, -0.25, -0.25, -0.25, -0.25, 0.25]
        linear_min: -1.0
        linear_max: 1.0
        theta_min: -1.0
        theta_max: 1.0
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/atlas/scan_filtered"
      enabled: true
    pointcloud:
      type: "pointcloud"
      topic: "/intel_realsense_r200_depth/points"
      transport_type: "raw" # Options: raw, zlib, draco, zstd
      min_height: 0.1
      max_height: 0.5
      use_global_height: false
      enabled: false
    # costmap:
    #   type: "costmap"
    #   topic: "local_costmap/costmap"
    #   cost_threshold: 254
    #   enabled: true
    #   treat_unknown_as_obstacle: true